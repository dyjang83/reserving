site_name: actuarial-reserving
site_description: P&C loss reserve estimation — chain-ladder, BF, and Cape Cod with bootstrap CIs
site_url: https://dyjang83.github.io/reserving
repo_url: https://github.com/dyjang83/reserving
repo_name: dyjang83/reserving

theme:
  name: material
  palette:
    primary: indigo
    accent: indigo
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - API reference:
    - Triangle: api/triangle.md
    - ChainLadder: api/chain_ladder.md
    - BornhuetterFerguson: api/bornhuetter_ferguson.md
    - CapeCod: api/cape_cod.md
    - Plot: api/plot.md

markdown_extensions:
  - pymdownx.highlight
  - pymdownx.superfences
  - admonition